name: Check semver
on: # zizmor: ignore[concurrency-limits] - concurrency is the caller's responsibility
  workflow_call:
    inputs:
      package:
        description: Package to check semver for (empty = all packages)
        default: ""
        type: string
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semver:
    name: Check semver
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: mozilla/actions/rust@4e0ca4226b7d37bf4d40624d083d7e7a48ede1a1 # v1
        with:
          tools: cargo-semver-checks
          token: ${{ github.token }}

      - name: Check semver
        env:
          PACKAGE: ${{ inputs.package }}
          BASE_REF: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}
        run: |
          PACKAGE_ARG=""
          [ -n "$PACKAGE" ] && PACKAGE_ARG="-p $PACKAGE"
          # shellcheck disable=SC2086
          cargo semver-checks --default-features --baseline-rev "origin/$BASE_REF" $PACKAGE_ARG
