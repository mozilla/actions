name: Test Actions
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    uses: ./.github/workflows/actionlint.yml
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to GitHub

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/dependency-review.yml

  test-rust:
    name: Test rust action
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./rust
        with:
          version: stable
          tools: cargo-nextest
          token: ${{ github.token }}

      - name: Verify installation
        run: |
          cargo --version
          rustc --version
          cargo nextest --version

  test-toolchains:
    name: Test toolchains action
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    # cargo is pre-installed on GitHub-hosted Ubuntu runners
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create test Cargo.toml
        run: |
          mkdir -p /tmp/test-crate/src
          cat > /tmp/test-crate/Cargo.toml << 'EOF'
          [package]
          name = "test-crate"
          version = "0.1.0"
          rust-version = "1.70.0"
          edition = "2021"
          EOF
          touch /tmp/test-crate/src/lib.rs

      - uses: ./toolchains
        id: toolchains
        with:
          working-directory: /tmp/test-crate

      - name: Verify output
        env:
          TOOLCHAINS: ${{ steps.toolchains.outputs.toolchains }}
        run: |
          echo "Toolchains: $TOOLCHAINS"
          python3 -c "
          import os, json
          data = json.loads(os.environ['TOOLCHAINS'])
          assert len(data) == 3, f'Expected 3 toolchains, got {data}'
          assert '1.70.0' in data, f'Expected MSRV 1.70.0 in {data}'
          assert 'stable' in data, f'Expected stable in {data}'
          assert 'nightly' in data, f'Expected nightly in {data}'
          print('OK:', data)
          "

  test-nss:
    name: Test nss action
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./nss
        with:
          minimum-version: "3.90"

      - name: Verify NSS is available
        run: |
          if [ -n "$NSS_DIR" ]; then
            echo "NSS_DIR=$NSS_DIR (built from source)"
          else
            pkg-config --modversion nss
            echo "Using system NSS: $(pkg-config --modversion nss)"
          fi

  test-nss-android:
    name: Test nss action (Android)
    timeout-minutes: 60
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 23

      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: Install Android NDK
        run: |
          # NDK version matches Mozilla's official build toolchain.
          # See https://searchfox.org/mozilla-central/search?q=NDK_VERSION=&path=python/mozboot/mozboot/android.py
          sdkmanager --install "ndk;27.2.12479018"

      - uses: ./nss
        with:
          minimum-version: "3.90"
          target: aarch64-linux-android

      - name: Verify NSS is available for Android
        run: |
          echo "NSS_DIR=$NSS_DIR"
          ls dist/Release/lib/*.a
